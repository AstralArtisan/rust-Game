name: Claude Code Review

on:
  pull_request_target:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      # 安全：工作区根目录检出 base ref（默认，不带 ref:），
      # 不让 fork 不可信代码出现在 action 视为仓库根的位置
      - name: Checkout base repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # PR head 检出到独立子目录，仅供 Claude 阅读 diff/文件，不在根目录执行
      - name: Checkout PR head into subdir
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: pr-head
          fetch-depth: 0

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
        with:
          # 显式传入 workflow 自带的 GITHUB_TOKEN，跳过 anthropics/claude-code-action
          # 默认的 OIDC → Anthropic GitHub App token 交换流程（我们用的是第三方
          # API 代理，没装 Anthropic 的 GitHub App，OIDC 交换必然 401）。
          github_token: ${{ secrets.GITHUB_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --model claude-sonnet-4-6
            --add-dir pr-head
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }} --comment'

      - name: Ensure review visibility
        if: ${{ steps.claude-review.outcome == 'success' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail

          run_started_at="$(gh api "repos/${REPO}/actions/runs/${RUN_ID}" --jq '.created_at')"
          issue_comment_count="$(
            gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
              --jq "map(select(.created_at >= \"$run_started_at\" and (((.body | ascii_downcase) | contains(\"## code review\")) or (.body | contains(\"Generated with [Claude Code]\")) or ((.body | ascii_downcase) | contains(\"automated review workflow\")) or (.body | contains(\"No published review comments were produced by Claude\"))))) | length"
          )"

          review_comment_count="$(
            gh api "repos/${REPO}/pulls/${PR_NUMBER}/comments" \
              --jq "map(select(.created_at >= \"$run_started_at\")) | length"
          )"

          if [ "$issue_comment_count" -eq 0 ] && [ "$review_comment_count" -eq 0 ]; then
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body $'## Code review\n\nNo published review comments were produced by Claude. The automated review workflow completed successfully.'
          else
            echo "Claude review already produced visible PR feedback in this run."
          fi
